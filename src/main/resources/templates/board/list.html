<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시판 목록</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .top {
      margin-bottom: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    th {
      background-color: #f4f4f4;
    }

    .btn {
      padding: 6px 12px;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }

    .btn:hover {
      background: #555;
    }
  </style>

</head>

<body>

<h1>게시판 목록</h1>

<div class="top">
  <a href="/board/write" class="btn">글 작성</a>
</div>


<table>
  <thead>
  <tr>
    <th>번호</th>
    <th>제목</th>
    <th>작성자</th>
  </tr>
  </thead>

  <tbody>
  <!-- Thymeleaf로 반복 -->
  <tr th:each="board : ${boards}">
    <td>
      <a th:href="@{/board/{id}(id=${board.id})}">
        <span th:text="${board.id}"></span>
      </a>
    </td>

    <td th:text="${board.title}"></td>
    <td th:text="${board.writer}"></td>
  </tr>
  </tbody>
</table>

</body>
</html>
